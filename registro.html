<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="css/CSSregistro.css">
</head>
<body>
    <main> 
        <h1>Registro para Nuevo Usuario</h1>
        <section1>
            <h3>Nombre:</h3>
                <input type="text" id="nombre" name="nombre">
            <h3>Apellido:</h3>
                <input type="text" id="apellido" name="apellido">
            <h3>Edad:</h3>
                <input type="number" id="edad" name="edad">
            <h3>¿Practica algun deporte?</h3>
                <input type=radio id="deporte1" name="deporte" value="si">
                <label for="deporte1">Sí</label>    
                <input type=radio id="deporte2" name="deporte" value="no">
                <label for="deporte2">No</label>
            <h3>Género:</h3>
                <input type="radio"
                id="genero1" name="genero" value="masculino">
                <label for="genero1">Masculino</label>
                <input type="radio" id="genero2" name="genero" value="femenino">
                <label for="genero2">Femenino</label>
                <input type="radio" id="genero3" name="genero" value="otro">
                <label for="genero3">Prefiero no especificar</label>
            <h3>Objetivo Profesional</h3>
                <input type="text" id="objetivo" name="objetivo">
            <h3>Nivel de Experiencia</h3>
                <input type= radio id="nivel1" name="nivel" value="principiante">
                <label for="nivel1">Principiante</label>
                <input type= radio id="nivel2" name="nivel" value="intermedio">
                <label for="nivel2">Intermedio</label>
                <input type= radio id="nivel3" name="nivel" value="avanzado">
                <label for="nivel3">Avanzado</label>
            <h3>Numero de Teléfono:</h3>
                <input type="text" id="telefono" name="telefono">
            <h3>Email:</h3>
                <input type="text" id="email" name="email" required>
            <h3>Contraseña:</h3>
                <input type="password" id="password" name="password" required>
        </section1>
        <nav>
                <button>Registrarse</button>
                <hr>
        </nav>
            <nav>
                <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
            </nav>   
        <footer>
        <p>© 2026 Club Deportivo</p>
        </footer>

    </main>










</html>
